<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ Yoonjin GOM ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e0e12;--surface:#16161e;--surface2:#1e1e28;--border:#2c2c3e;--border2:#383850;--accent:#a78bfa;--accent3:#67e8f9;--text:#e8e8f0;--text-muted:#6b6b8a;--text-dim:#4a4a62;--green:#4ade80;--red:#f87171;--gold:#fbbf24;--kor:#f472b6;--jap:#60a5fa;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{position:sticky;top:0;z-index:100;background:rgba(14,14,18,0.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:58px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:4px;color:var(--text);}
.logo em{color:var(--accent);}
.logo-sub{font-size:0.6rem;letter-spacing:3px;color:var(--text-dim);text-transform:uppercase;margin-left:0.5rem;}
nav button{background:none;border:none;cursor:pointer;color:var(--text-muted);font-family:'DM Sans',sans-serif;font-size:0.8rem;font-weight:500;padding:0.4rem 0.85rem;border-radius:6px;transition:all 0.15s;}
nav button:hover{color:var(--text);background:var(--surface2);}
nav button.active{color:var(--accent);background:var(--surface2);}
main{max-width:1080px;margin:0 auto;padding:2rem 1.5rem;}
.page{display:none;}
.page.active{display:block;animation:fadeIn 0.25s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.caja-div{display:flex;align-items:center;gap:0.75rem;margin:1.5rem 0 1.2rem;}
.caja-div-line{flex:1;height:1px;background:var(--border);}
.caja-div-label{font-size:0.7rem;text-transform:uppercase;letter-spacing:2.5px;color:var(--text-muted);padding:0.2rem 0.8rem;border-radius:20px;border:1px solid var(--border);background:var(--surface2);white-space:nowrap;}
.caja-div.kor .caja-div-label{color:var(--kor);border-color:rgba(244,114,182,0.3);background:rgba(244,114,182,0.06);}
.caja-div.jap .caja-div-label{color:var(--jap);border-color:rgba(96,165,250,0.3);background:rgba(96,165,250,0.06);}
.go-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem;}
.go-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:all 0.2s;cursor:pointer;}
.go-card:hover{border-color:var(--border2);box-shadow:0 4px 24px rgba(0,0,0,0.3);transform:translateY(-1px);}
.go-card.kor{border-left:2px solid var(--kor);}
.go-card.jap{border-left:2px solid var(--jap);}
.go-card-inner{padding:1.1rem 1.2rem;}
.go-card-name{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:2px;line-height:1.1;}
.go-card-artist{font-size:0.75rem;color:var(--text-muted);margin-top:2px;margin-bottom:0.5rem;}
.go-card-tracking{font-family:'Space Mono',monospace;font-size:0.68rem;color:var(--text-dim);background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:0.15rem 0.5rem;margin-bottom:0.5rem;display:inline-block;}
.go-card-stats{display:flex;gap:1rem;margin-top:0.4rem;}
.go-card-stat{font-size:0.75rem;color:var(--text-muted);}
.go-card-stat strong{color:var(--text);display:block;font-size:0.88rem;}
.go-card-photos{display:flex;gap:0.35rem;padding:0.5rem 0.75rem;background:var(--surface2);border-top:1px solid var(--border);overflow-x:auto;}
.go-card-photos::-webkit-scrollbar{height:3px;}
.go-card-photos::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.go-card-photo{width:52px;height:52px;object-fit:cover;flex-shrink:0;border-radius:7px;border:1px solid var(--border);cursor:pointer;transition:transform 0.15s;}
.go-card-photo:hover{transform:scale(1.07);}
.chip{font-size:0.67rem;font-weight:700;letter-spacing:0.5px;padding:0.2rem 0.6rem;border-radius:20px;text-transform:uppercase;white-space:nowrap;}
.chip-open{background:rgba(74,222,128,0.1);color:var(--green);border:1px solid rgba(74,222,128,0.25);}
.chip-closed{background:rgba(107,107,138,0.12);color:var(--text-muted);border:1px solid var(--border);}
.chip-arrived{background:rgba(74,222,128,0.1);color:var(--green);border:1px solid rgba(74,222,128,0.25);}
.chip-shipping{background:rgba(251,191,36,0.1);color:var(--gold);border:1px solid rgba(251,191,36,0.25);}
.chip-kor{background:rgba(244,114,182,0.1);color:var(--kor);border:1px solid rgba(244,114,182,0.25);}
.chip-jap{background:rgba(96,165,250,0.1);color:var(--jap);border:1px solid rgba(96,165,250,0.25);}
.back-btn{display:inline-flex;align-items:center;gap:0.4rem;background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:0.82rem;font-family:'DM Sans',sans-serif;padding:0.4rem 0;margin-bottom:1.2rem;transition:color 0.15s;}
.back-btn:hover{color:var(--accent);}
.detail-header{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.4rem 1.5rem;margin-bottom:1.2rem;}
.detail-title{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:3px;margin-bottom:0.3rem;}
.detail-sub{font-size:0.82rem;color:var(--text-muted);}
.detail-tracking{font-family:'Space Mono',monospace;font-size:0.82rem;color:var(--accent3);background:rgba(103,232,249,0.08);border:1px solid rgba(103,232,249,0.2);border-radius:6px;padding:0.3rem 0.75rem;cursor:pointer;display:inline-block;margin-top:0.6rem;}
.detail-tracking:hover{background:rgba(103,232,249,0.14);}
.detail-photos{display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:0.9rem;}
.detail-photo{width:80px;height:80px;object-fit:cover;border-radius:8px;border:1px solid var(--border);cursor:pointer;transition:transform 0.15s;}
.detail-photo:hover{transform:scale(1.05);}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:3px;color:var(--text-muted);margin-bottom:1rem;}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
table{width:100%;border-collapse:collapse;}
thead{background:var(--surface2);}
th{padding:0.7rem 1rem;text-align:left;font-size:0.67rem;text-transform:uppercase;letter-spacing:2px;color:var(--text-muted);font-weight:600;white-space:nowrap;}
th.num{text-align:center;}
td{padding:0.75rem 1rem;font-size:0.86rem;border-top:1px solid var(--border);vertical-align:middle;}
td.num{text-align:center;font-family:'Space Mono',monospace;font-size:0.85rem;font-weight:700;color:var(--accent);}
tr:hover td{background:rgba(255,255,255,0.015);}
tfoot td{padding:0.65rem 1rem;border-top:2px solid var(--border2);background:var(--surface2);font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);}
tfoot td.num{color:var(--accent);font-size:0.88rem;}
.j-name{font-weight:600;}
.j-phone{font-family:'Space Mono',monospace;font-size:0.75rem;color:var(--text-muted);}
.search-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.2rem;margin-bottom:1.2rem;}
.search-box{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:0.6rem 1rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.15s;}
.search-box:focus{border-color:var(--accent);}
.search-box::placeholder{color:var(--text-dim);}
.search-hint{font-size:0.72rem;color:var(--text-dim);margin-top:0.4rem;text-align:center;}
.pub-result{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem 1.1rem;margin-bottom:0.6rem;}
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:600;display:none;align-items:center;justify-content:center;cursor:pointer;}
#lightbox.open{display:flex;}
#lightbox img{max-width:90vw;max-height:90vh;border-radius:10px;object-fit:contain;}
.empty-state{text-align:center;padding:2.5rem;color:var(--text-muted);}
.empty-title{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:2px;}
.toast-container{position:fixed;bottom:1.5rem;right:1.5rem;z-index:700;display:flex;flex-direction:column;gap:0.4rem;}
.toast{background:var(--surface2);border:1px solid var(--border2);border-radius:9px;padding:0.65rem 1rem;font-size:0.82rem;display:flex;align-items:center;gap:0.45rem;animation:slideIn 0.2s ease;box-shadow:0 4px 20px rgba(0,0,0,0.4);}
@keyframes slideIn{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:translateX(0)}}
.toast .ti{color:var(--accent3);}
@media(max-width:640px){main{padding:1rem;}header{padding:0 1rem;}.logo-sub{display:none;}.detail-title{font-size:1.4rem;}}
</style>
</head>
<body>
<header>
  <div style="display:flex;align-items:baseline;">
    <div class="logo">YOONJIN<em>✦</em></div>
    <span class="logo-sub">GOM</span>
  </div>
  <nav>
    <button class="active" onclick="showPage('gos')">GOs</button>
    <button onclick="showPage('buscar')">🔍 Buscar</button>
  </nav>
</header>
<main>
  <div id="page-gos" class="page active" style="display:block">

      <div class="caja-div jap" style="margin-top:0.5rem"><div class="caja-div-line"></div><div class="caja-div-label">🇯🇵 Caja Japonesa</div><div class="caja-div-line"></div></div>
      <div class="go-cards" id="jap-grid"></div>
    </div>
    <div id="detail-view" style="display:none">
      <button class="back-btn" onclick="closeDetail()">← Volver</button>
      <div id="detail-header-wrap"></div>
      <div class="section-title" style="margin-top:1rem">JOINERS</div>
      <div class="table-wrap">
        <table>
          <thead id="dthead"></thead>
          <tbody id="dtbody"></tbody>
          <tfoot id="dtfoot"></tfoot>
        </table>
      </div>
    </div>
  </div>
  <div id="page-buscar" class="page" style="display:none">
    <div class="search-wrap">
      <input type="text" class="search-box" id="search-input" placeholder="Tu nombre, nick o teléfono..." oninput="doSearch()">
      <div class="search-hint">Busca por nombre o por los últimos dígitos de tu teléfono</div>
    </div>
    <div id="search-results"></div>
  </div>
</main>
<div id="lightbox" onclick="this.classList.remove('open')"><img id="lb-img" src="" alt=""></div>
<div class="toast-container" id="toasts"></div>

const JOINERS=[{"id": 1, "goId": 1, "name": "LOLA", "emoji": "\ud83d\udc7f", "phone": "+34667229013", "pc": 3, "album": 0, "merch": 0, "miren": 0}, {"id": 2, "goId": 1, "name": "ESTEFAN\u00cdA", "emoji": "\ud83d\udc8b", "phone": "+34622551343", "pc": 10, "album": 0, "merch": 0, "miren": 0}, {"id": 3, "goId": 1, "name": "JOTA", "emoji": "\u2b50\ufe0f", "phone": "+34664605631", "pc": 14, "album": 0, "merch": 0, "miren": 0}, {"id": 4, "goId": 1, "name": "CATA", "emoji": "\ud83e\udd5d", "phone": "+34611642349", "pc": 6, "album": 0, "merch": 0, "miren": 0}, {"id": 5, "goId": 1, "name": "AINA", "emoji": "\ud83d\udc41\ufe0f", "phone": "+34634357012", "pc": 1, "album": 0, "merch": 0, "miren": 0}, {"id": 6, "goId": 1, "name": "LAU", "emoji": "\ud83e\ude75", "phone": "+34699033999", "pc": 5, "album": 0, "merch": 0, "miren": 0}];

const SL={open:'Abierto',closed:'Cerrado',shipping:'En envío',arrived:'Llegado'};
const SC={open:'chip-open',closed:'chip-closed',shipping:'chip-shipping',arrived:'chip-arrived'};
const chip=s=>`<span class="chip ${SC[s]}">${SL[s]}</span>`;
const cajaBadge=c=>`<span class="chip chip-${c}">${c==='kor'?'🇰🇷 Coreana':'🇯🇵 Japonesa'}</span>`;
function censor(p){if(!p||p==='-')return'–';const s=p.replace(/[\s\-\+]/g,'');if(s.length<=3)return'·····'+s;return'·'.repeat(Math.max(0,s.length-3))+s.slice(-3);}
function getJs(id){return JOINERS.filter(j=>j.goId===id);}
function tots(id){const js=getJs(id);return{count:js.length,pc:js.reduce((a,j)=>a+(j.pc||0),0),album:js.reduce((a,j)=>a+(j.album||0),0),merch:js.reduce((a,j)=>a+(j.merch||0),0),miren:js.reduce((a,j)=>a+(j.miren||0),0)};}

function showPage(p){
  document.querySelectorAll('.page').forEach(el=>{el.style.display='none';el.classList.remove('active');});
  document.querySelectorAll('nav button').forEach((b,i)=>b.classList.toggle('active',['gos','buscar'][i]===p));
  const pg=document.getElementById('page-'+p);
  pg.style.display='block';pg.classList.add('active');
  if(p==='gos'){closeDetail();renderGos();}
  else{document.getElementById('search-results').innerHTML='';document.getElementById('search-input').value='';}
}

function renderGos(){
  const kor=GOMS.filter(g=>g.caja==='kor');
  const jap=GOMS.filter(g=>g.caja==='jap');
  document.getElementById('kor-grid').innerHTML=kor.length?kor.map(goCard).join(''):`<div class="empty-state"><div class="empty-title">Sin GOs</div></div>`;
  document.getElementById('jap-grid').innerHTML=jap.length?jap.map(goCard).join(''):`<div class="empty-state"><div class="empty-title">Sin GOs</div></div>`;
}

function goCard(g){
  const t=tots(g.id);
  const photos=g.photos||[];
  const strip=photos.length?`<div class="go-card-photos">${photos.map(p=>`<img src="${p}" class="go-card-photo" onclick="event.stopPropagation();openLb('${p}')" alt="">`).join('')}</div>`:'';
  return`<div class="go-card ${g.caja}" onclick="openDetail(${g.id})">
    <div class="go-card-inner">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.4rem">
        <div><div class="go-card-name">${g.name}</div><div class="go-card-artist">${g.artist||''}</div></div>
        ${chip(g.status)}
      </div>
      ${g.tracking?`<div class="go-card-tracking">📦 ${g.tracking}</div>`:''}
      <div class="go-card-stats">
        <div class="go-card-stat"><strong>${t.count}</strong>Joiners</div>
        <div class="go-card-stat"><strong>${t.pc}</strong>PCs</div>
        ${t.album?`<div class="go-card-stat"><strong>${t.album}</strong>Álbumes</div>`:''}
        ${t.merch?`<div class="go-card-stat"><strong>${t.merch}</strong>Merch</div>`:''}
      </div>
      ${g.notes?`<div style="font-size:0.75rem;color:var(--text-muted);margin-top:0.4rem">${g.notes}</div>`:''}
    </div>
    ${strip}
  </div>`;
}

function openDetail(goId){
  const g=GOMS.find(x=>x.id===goId);if(!g)return;
  document.getElementById('gos-view').style.display='none';
  document.getElementById('detail-view').style.display='block';
  const photos=g.photos||[];
  document.getElementById('detail-header-wrap').innerHTML=`
    <div class="detail-header">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:0.75rem">
        <div>
          <div style="display:flex;gap:0.5rem;margin-bottom:0.3rem">${cajaBadge(g.caja)} ${chip(g.status)}</div>
          <div class="detail-title">${g.name}</div>
          <div class="detail-sub">${g.artist||''}</div>
        </div>
      </div>
      ${g.tracking?`<div class="detail-tracking" onclick="copyT('${g.tracking}')" title="Click para copiar">📦 ${g.tracking}</div>`:''}
      ${g.notes?`<div style="font-size:0.8rem;color:var(--text-muted);margin-top:0.6rem">${g.notes}</div>`:''}
      ${photos.length?`<div class="detail-photos">${photos.map(p=>`<img src="${p}" class="detail-photo" onclick="openLb('${p}')" alt="">`).join('')}</div>`:''}
    </div>`;
  const js=getJs(goId);
  const showPc=js.some(j=>j.pc>0);
  const showAlbum=js.some(j=>j.album>0);
  const showMerch=js.some(j=>j.merch>0);
  const showMiren=js.some(j=>j.miren>0);
  document.getElementById('dthead').innerHTML=`<tr>
    <th>Persona</th><th>Número</th><th style="text-align:center">Emoji</th>
    ${showPc?'<th class="num">PC</th>':''}
    ${showAlbum?'<th class="num">Álbum</th>':''}
    ${showMerch?'<th class="num">Merch</th>':''}
    ${showMiren?'<th class="num">Miren</th>':''}
  </tr>`;
  document.getElementById('dtbody').innerHTML=js.map(j=>`<tr>
    <td><div class="j-name">${j.name}</div></td>
    <td><div class="j-phone">${censor(j.phone)}</div></td>
    <td style="text-align:center;font-size:1.1rem">${j.emoji||'–'}</td>
    ${showPc?`<td class="num">${j.pc||0}</td>`:''}
    ${showAlbum?`<td class="num">${j.album||0}</td>`:''}
    ${showMerch?`<td class="num">${j.merch||0}</td>`:''}
    ${showMiren?`<td class="num">${j.miren||0}</td>`:''}
  </tr>`).join('');
  const t=tots(goId);
  document.getElementById('dtfoot').innerHTML=`<tr>
    <td colspan="3" style="text-align:right">Total del GO:</td>
    ${showPc?`<td class="num">${t.pc}</td>`:''}
    ${showAlbum?`<td class="num">${t.album}</td>`:''}
    ${showMerch?`<td class="num">${t.merch}</td>`:''}
    ${showMiren?`<td class="num">${t.miren}</td>`:''}
  </tr>`;
}

function closeDetail(){
  document.getElementById('detail-view').style.display='none';
  document.getElementById('gos-view').style.display='block';
}

function doSearch(){
  const q=document.getElementById('search-input').value.trim().toLowerCase();
  const res=document.getElementById('search-results');
  if(q.length<2){res.innerHTML=`<div style="text-align:center;color:var(--text-dim);font-size:0.82rem;padding:1rem">Escribe al menos 2 caracteres...</div>`;return;}
  const matches=JOINERS.filter(j=>j.name.toLowerCase().includes(q)||(j.phone||'').replace(/[\s\+\-]/g,'').includes(q.replace(/[\s\+\-]/g,''))||(j.emoji||'').includes(q));
  if(!matches.length){res.innerHTML=`<div class="empty-state"><div class="empty-title">Sin resultados</div></div>`;return;}
  res.innerHTML=matches.map(j=>{
    const go=GOMS.find(g=>g.id===j.goId);
    return`<div class="pub-result">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:0.5rem">
        <div><div style="font-weight:700;font-size:0.95rem">${j.emoji||''} ${j.name}</div><div class="j-phone" style="margin-top:0.2rem">${censor(j.phone)}</div></div>
      </div>
      ${go?`<div style="margin-top:0.6rem;display:flex;gap:0.4rem;flex-wrap:wrap;align-items:center">${cajaBadge(go.caja)} ${chip(go.status)}<span style="font-size:0.8rem;color:var(--text-muted)">GO: <strong style="color:var(--text)">${go.name}</strong></span></div>`:''}
      <div style="margin-top:0.6rem;display:flex;gap:1rem;flex-wrap:wrap">
        ${j.pc?`<span style="font-size:0.82rem"><strong style="font-family:'Space Mono',monospace;color:var(--accent)">${j.pc}</strong> <span style="color:var(--text-muted)">PC</span></span>`:''}
        ${j.album?`<span style="font-size:0.82rem"><strong style="font-family:'Space Mono',monospace;color:var(--accent)">${j.album}</strong> <span style="color:var(--text-muted)">Álbum</span></span>`:''}
        ${j.merch?`<span style="font-size:0.82rem"><strong style="font-family:'Space Mono',monospace;color:var(--accent)">${j.merch}</strong> <span style="color:var(--text-muted)">Merch</span></span>`:''}
        ${j.miren?`<span style="font-size:0.82rem"><strong style="font-family:'Space Mono',monospace;color:var(--accent)">${j.miren}</strong> <span style="color:var(--text-muted)">Miren</span></span>`:''}
      </div>
    </div>`;
  }).join('');
}

function openLb(src){document.getElementById('lb-img').src=src;document.getElementById('lightbox').classList.add('open');}
function copyT(t){navigator.clipboard.writeText(t).then(()=>toast('Número copiado ✓'));}
function toast(msg){const c=document.getElementById('toasts');const el=document.createElement('div');el.className='toast';el.innerHTML=`<span class="ti">✓</span> ${msg}`;c.appendChild(el);setTimeout(()=>el.remove(),3000);}

renderGos();
</script>
</body>
</html>
